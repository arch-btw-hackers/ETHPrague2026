name: CI

on:
  push:
    branches: [microservice]
  pull_request:
    branches: [microservice]

jobs:
  test:
    name: Test (Python 3.12)
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: gigaservice

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Cache pip dependencies
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('gigaservice/requirements*.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Run tests
        env:
          JWT_SECRET: ci-test-secret
          PYTHONPATH: ${{ github.workspace }}/gigaservice
        run: pytest -q

  deploy:
    name: Deploy to production server
    runs-on: ubuntu-latest
    needs: test
    if: github.ref == 'refs/heads/microservice' && github.event_name == 'push'

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_IP }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd ~/ETHPrague2026
            git pull origin microservice
            docker compose up -d --build
