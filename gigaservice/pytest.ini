[pytest]
# Run from the gigaservice/ directory:
#   cd gigaservice && pytest
#
# Or from the repo root:
#   pytest gigaservice/tests/ --rootdir=gigaservice
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
asyncio_mode = auto

# Coverage (requires pytest-cov):
#   pytest --cov=. --cov-report=term-missing --cov-fail-under=80
addopts =
    -v
    --tb=short
    --strict-markers

markers =
    unit: Unit tests (no I/O)
    api: API endpoint tests
    integration: End-to-end tests requiring full stack
